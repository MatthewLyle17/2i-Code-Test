<!DOCTYPE html>
<html>
<body>

<p id="display"></p>

<script>

//loop 10 times 
for (var i = 0; i < 10; i++) {
    //generate random number 
    var count = Math.floor((Math.random() * 100) + 1);
    }

    //add number to array (ran out of timme to create array)
    count++
    document.getElementById("display").innerHTML = count + ", " ;


</script>

</body>
</html>
